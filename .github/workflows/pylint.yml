name: Pylint

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

jobs:
  lint:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pylint
        pip install -r requirements.txt

    - name: Run Pylint
      run: |
        pylint agi_agent/ --rcfile=.pylintrc --output-format=colorized
      continue-on-error: true

    - name: Generate Pylint report
      run: |
        pylint agi_agent/ --rcfile=.pylintrc --output-format=text > pylint_report.txt || true
        echo "=== Pylint Report ==="
        cat pylint_report.txt
        echo ""
        echo "=== Pylint Score ==="
        grep -E "^Your code has been rated" pylint_report.txt || true

    - name: Upload Pylint report
      uses: actions/upload-artifact@v4
      with:
        name: pylint-report-python-${{ matrix.python-version }}
        path: pylint_report.txt
        retention-days: 7
